<h1 id="chapter-1-introduction-to-probability">Chapter 1: Introduction to Probability</h1>
<p><strong>Probability</strong> is the mathematical framework for quantifying uncertainty.</p>
<p>Key concepts we'll explore:</p>
<ul>
<li>Sample spaces and events</li>
<li>Axioms of probability</li>
<li>Counting principles</li>
<li>Conditional probability</li>
</ul>
<footer>STAT 241 - Interactive Lecture Notes</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="&lt;img src='uofs-logo.png'&gt;" data-footer="STAT 241 - Interactive Lecture Notes" data-theme="stats241" lang="C" data-marpit-pagination="4" style="--paginate:true;--header:&lt;img src='uofs-logo.png'&gt;;--footer:STAT 241 - Interactive Lecture Notes;--theme:stats241;" data-marpit-pagination-total="12">
<header><img src='uofs-logo.png' /></header>
<h1 id="the-coin-flip-experiment">The Coin Flip Experiment</h1>
<p><strong>Question:</strong> If we flip a fair coin many times, what fraction of flips will be heads?</p>
<p>The <strong>Law of Large Numbers</strong> tells us the answer converges to 0.5 as the number of flips increases.</p>
<p>Let's see this in action with an interactive simulation!</p>
<footer>STAT 241 - Interactive Lecture Notes</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="&lt;img src='uofs-logo.png'&gt;" data-footer="STAT 241 - Interactive Lecture Notes" data-class="lab" data-theme="stats241" lang="C" class="lab" data-marpit-pagination="5" style="--paginate:true;--header:&lt;img src='uofs-logo.png'&gt;;--footer:STAT 241 - Interactive Lecture Notes;--class:lab;--theme:stats241;" data-marpit-pagination-total="12">
<header><img src='uofs-logo.png' /></header>

<h1 id="%F0%9F%8E%AE-lab-coin-flip-simulator"><img class="emoji" draggable="false" alt="🎮" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/1f3ae.svg" data-marp-twemoji=""/> Lab: Coin Flip Simulator</h1>
<div class="game-container">
  <iframe src="game/index.html" width="480" height="320" frameborder="0" allowfullscreen></iframe>
</div>
<p><strong>Instructions:</strong> Click to flip coins and observe how the proportion converges!</p>
<footer>STAT 241 - Interactive Lecture Notes</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="&lt;img src='uofs-logo.png'&gt;" data-footer="STAT 241 - Interactive Lecture Notes" data-theme="stats241" lang="C" data-marpit-pagination="6" style="--paginate:true;--header:&lt;img src='uofs-logo.png'&gt;;--footer:STAT 241 - Interactive Lecture Notes;--theme:stats241;" data-marpit-pagination-total="12">
<header><img src='uofs-logo.png' /></header>
<h1 id="understanding-the-simulation">Understanding the Simulation</h1>
<p>What you observed:</p>
<ul>
<li><strong>Short run:</strong> High variability in the proportion of heads</li>
<li><strong>Long run:</strong> Proportion stabilizes around 0.5</li>
</ul>
<p>This is the <strong>empirical</strong> demonstration of:</p>
<p><mjx-container class="MathJax" jax="SVG" display="true" style="margin: 0;"><svg style="vertical-align: -0.452ex; display: block; width: 100%; height: auto; max-height: 2.149ex;" xmlns="http://www.w3.org/2000/svg" width="97.738ex" height="2.149ex" role="img" focusable="false" viewBox="0 -750 43200 950"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="merror" data-mjx-error="'#' can not be used here" title="'#' can not be used here"><rect data-background="true" width="43200" height="950" y="-200"></rect><title>'#' can not be used here</title><g data-mml-node="mtext" style="font-family: serif;"><text data-variant="-explicitFont" transform="scale(1,-1)" font-size="884px">P(\text{heads}) = \lim_{n \to \infty} \frac{\text{# of heads}}{n} = 0.5 </text></g></g></g></g></svg></mjx-container></p><footer>STAT 241 - Interactive Lecture Notes</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="&lt;img src='uofs-logo.png'&gt;" data-footer="STAT 241 - Interactive Lecture Notes" data-theme="stats241" lang="C" data-marpit-pagination="7" style="--paginate:true;--header:&lt;img src='uofs-logo.png'&gt;;--footer:STAT 241 - Interactive Lecture Notes;--theme:stats241;" data-marpit-pagination-total="12">

<h1 id="sample-spaces">Sample Spaces</h1>
<p><strong>Definition:</strong> A <em>sample space</em> <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.633ex" height="1.593ex" role="img" focusable="false" viewBox="0 -704 722 704"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="3A9" d="M55 454Q55 503 75 546T127 617T197 665T272 695T337 704H352Q396 704 404 703Q527 687 596 615T666 454Q666 392 635 330T559 200T499 83V80H543Q589 81 600 83T617 93Q622 102 629 135T636 172L637 177H677V175L660 89Q645 3 644 2V0H552H488Q461 0 456 3T451 20Q451 89 499 235T548 455Q548 512 530 555T483 622T424 656T361 668Q332 668 303 658T243 626T193 560T174 456Q174 380 222 233T270 20Q270 7 263 0H77V2Q76 3 61 89L44 175V177H84L85 172Q85 171 88 155T96 119T104 93Q109 86 120 84T178 80H222V83Q206 132 162 199T87 329T55 454Z"></path></g></g></g></svg></mjx-container> is the set of all possible outcomes of an experiment.</p>
